<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/style.css?v=3">
    <title>TecWeb - Iniciar sesión</title>
</head>
<body>
    <!-- Pantalla exclusiva de inicio de sesión. -->
    <div class="page auth-page">
        <div class="brand">
            <h1>TecWeb • Login</h1>
        </div>
        <section>
            <div class="card">
                <h2>Iniciar sesión</h2>
                <div class="hint">Ingresa con tu correo y contraseña para continuar.</div>
                <form id="login-form" action="">
                    <div class="row">
                        <label for="login-email">Correo</label>
                        <input type="email" id="login-email" autocomplete="email" required>
                    </div>
                    <div class="row">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" autocomplete="current-password" required>
                    </div>
                    <div class="actions">
                        <button class="btn-primary" type="submit">Entrar</button>
                        <a class="btn-link" href="/register">Crear cuenta</a>
                    </div>
                    <p id="login-error" class="error" style="display: none;"></p>
                </form>
            </div>
        </section>
    </div>
    <script src="/frontend/login.js?v=1"></script>
</body>
</html>
