# Blueprint opcional para Render: New > Blueprint > conectar este repo.
# Plan free: el disco del contenedor es efímero; SQLite se pierde al redesplegar salvo que añadas disco persistente (planes de pago) y DATABASE_URL.

services:
  - type: web
    name: university-tecweb
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: JWT_SECRET
        generateValue: true
      # Correo por HTTPS. Principal: SendGrid; respaldo: Resend, Brevo.
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: MAIL_OTP_LOG_ONLY
        sync: false
